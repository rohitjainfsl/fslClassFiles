    let para = document.querySelector("p")
    let originalValue = para.innerHTML
    let start = document.querySelector("button:first-of-type")
    let stop = document.querySelector("button:last-of-type")
    let x;

    start.onclick = () => {
      x = setInterval(() => {
        let letters = para.innerHTML.split("")
        console.log(letters)
        let lastLetter = letters.pop()
        letters.unshift(lastLetter)
        para.innerHTML = letters.join("")
      }, 1000)

    }

    stop.onclick = () => {
      clearInterval(x)
      para.innerHTML = originalValue
    }
