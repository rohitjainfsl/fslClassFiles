<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Async & Await</title>
</head>
<body>
  <div id="wrapper">

  </div>
  <script>
    let x = 0

    function step1(input){
      return input + 1
    }
    function step2(input){
      return input + 2
    }
    function step3(input){
      return input + 3
    }
    function step4(input){
      return input + 4
    }

    const startingLine = async (x) => {
      const pass1 = await step1(x)
      const pass2 = await step2(pass1)
      const pass3 = await step3(pass2)
      const pass4 = await step4(pass3)

      return pass4
    }

    

  </script>
</body>
</html>
