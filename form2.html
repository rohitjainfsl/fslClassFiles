<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
</head>
<body>
  <div>
    <h2>Registration Form</h2>
    <h5>Fill this form to enroll in Full Stack Learning</h5>
    <form action="">
      <label for="">Name</label>
      <input type="text" placeholder="Enter full name"><br>

      <label for="">Email</label>
      <input type="email" placeholder="Enter full Email"><br>

      <label for="">Father's Name</label>
      <input type="text" placeholder="Enter father's name"><br>

      <label for="">Phone</label>
      <input type="text" placeholder="Enter phone number"><br>

      <label for="">Father's Phone</label>
      <input type="text" placeholder="Enter father's phone number"><br>

      <label for="">DOB</label>
      <input type="date" ><br>

      <label for="">Gender</label>
      <input type="radio" value="male">male
      <input type="radio" value="female">Female
      <input type="radio" value="other">Other      
      <br>

      <label for="">Course</label>
      <select name="" id="">
        <option value="" selected disabled>Select Course</option>
        <option value="">Javascript</option>
        <option value="">React</option>
        <option value="">Node</option>
      </select>
      <br>

      <label for="">Full Address</label>
      <textarea name="" placeholder="Full Postal Address" id="" cols="30" rows="10"></textarea>
      <br>
      <input type="submit" value="Register">
    </form>
  </div>
</body>
</html>
