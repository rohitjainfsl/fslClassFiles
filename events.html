<body>
  <div id="wrapper">
    <!-- <button>+</button>

    <!-- <textarea name="" id="" cols="30" rows="10"></textarea>

    <input type="text" placeholder="First Number">
    <input type="text" placeholder="Second Number">
    <select name="" id="">
      <option value="" selected disabled>Select Operation</option>
      <option value="+">Add</option>
      <option value="-">Subtract</option>
      <option value="*">Multiply</option>
      <option value="/">Divide</option>
      <option value="%">Modulus</option>
    </select>
    <p></p>
    
  </div>
  <script>

    const select = document.querySelector("select");
    const para = document.querySelector("p");
    select.onchange = () => {
      const input1 = Number(document.querySelector("input:first-of-type").value)
      const input2 = Number(document.querySelector("input:last-of-type").value)
      switch(select.value){
        case "+":
          para.innerHTML = input1+input2
          break;
        case "-":
          para.innerHTML = input1-input2
          break;
        case "*":
          para.innerHTML = input1*input2
          break;
        case "/":
          para.innerHTML = input1/input2
          break;
        case "%":
          para.innerHTML = input1%input2
          break;
        default:
          para.innerHTML = "Wrong Input"
      }
    }
    // JS considers all inputs as strings, 
    //convert string to number before addition

   document.querySelector("textarea").onkeyup = () => {
    document.querySelector("textarea").setAttribute("maxlength", 100)
    let remaining = 100 - document.querySelector("textarea").value.length
    if(remaining > 20) document.querySelector("p").style.color = '#000'
    else document.querySelector("p").style.color = '#f00'
    document.querySelector("p").innerHTML = remaining
   }
